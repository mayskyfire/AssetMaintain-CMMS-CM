version: '3.8'

services:
  # Nuxt Application
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: assetmaintain-app
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - HOST=0.0.0.0
      - PORT=3000
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT:-3306}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${MYSQLDATABASE}
      - DB_CONNECTION_LIMIT=${DB_CONNECTION_LIMIT:-10}
      - DB_QUEUE_LIMIT=${DB_QUEUE_LIMIT:-0}
      - S3_URL=${S3_URL}
      - UPLOAD_URL=${UPLOAD_URL}
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000', (r) => process.exit(r.statusCode === 200 ? 0 : 1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Caddy Reverse Proxy with SSL
  caddy:
    image: caddy:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"  # HTTP/3
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
      - caddy_logs:/var/log/caddy
    depends_on:
      - app
    networks:
      - app-network

volumes:
  caddy_data:
  caddy_config:
  caddy_logs:

networks:
  app-network:
    driver: bridge
